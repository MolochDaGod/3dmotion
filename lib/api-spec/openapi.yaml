openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: meshy
    description: Meshy AI 3D pipeline operations
  - name: chat
    description: AI chatbot for Meshy prompt optimization
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /meshy/chat:
    post:
      operationId: meshyChat
      tags: [chat]
      summary: AI prompt optimizer chat
      description: |
        Chat with an AI assistant that specializes in crafting optimal Meshy API prompts
        for game-ready 3D characters. Knows all Meshy parameters, pose modes, polycount
        guidelines, and rigging requirements.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: AI response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /meshy/text-to-3d/preview:
    post:
      operationId: meshyCreatePreview
      tags: [meshy]
      summary: Create a Text-to-3D preview task
      description: Submit a prompt to Meshy API to generate a preview 3D mesh (no texture).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PreviewRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/text-to-3d/refine:
    post:
      operationId: meshyCreateRefine
      tags: [meshy]
      summary: Create a Text-to-3D refine task
      description: Add textures to a completed preview task using PBR maps.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefineRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/text-to-3d/{id}:
    get:
      operationId: meshyGetTask
      tags: [meshy]
      summary: Poll a Text-to-3D task
      description: Get current status and result URLs for a Text-to-3D task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MeshyTask"

  /meshy/rig:
    post:
      operationId: meshyCreateRig
      tags: [meshy]
      summary: Create an auto-rigging task
      description: Submit a completed textured GLB for Meshy auto-rigging to produce a game-ready FBX with Mixamo-compatible skeleton.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RigRequest"
      responses:
        "200":
          description: Rigging task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/rig/{id}:
    get:
      operationId: meshyGetRig
      tags: [meshy]
      summary: Poll a rigging task
      description: Get current status and download URLs for a rigging task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Rigging task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RigTask"

  /meshy/text-to-image:
    post:
      operationId: meshyCreateTextToImage
      tags: [meshy]
      summary: Create a Text-to-Image task
      description: Generate a high-quality image from a text prompt, optionally in T-pose or multi-view for character concept art.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TextToImageRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/text-to-image/{id}:
    get:
      operationId: meshyGetTextToImage
      tags: [meshy]
      summary: Poll a Text-to-Image task
      description: Get current status and generated image URLs for a Text-to-Image task.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TextToImageTask"

  /meshy/retexture:
    post:
      operationId: meshyCreateRetexture
      tags: [meshy]
      summary: Create a Retexture task
      description: Apply a new texture style to an existing 3D model using either a text prompt or reference image.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetextureRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/retexture/{id}:
    get:
      operationId: meshyGetRetexture
      tags: [meshy]
      summary: Poll a Retexture task
      description: Get current status and retextured model URLs.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetextureTask"

  /meshy/remesh:
    post:
      operationId: meshyCreateRemesh
      tags: [meshy]
      summary: Create a Remesh task
      description: Reduce polycount, re-topology, or convert format of an existing model. Required before rigging if model exceeds 300k faces.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemeshRequest"
      responses:
        "200":
          description: Task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskIdResponse"

  /meshy/remesh/{id}:
    get:
      operationId: meshyGetRemesh
      tags: [meshy]
      summary: Poll a Remesh task
      description: Get current status and remeshed model download URLs.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RemeshTask"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ChatMessage:
      type: object
      properties:
        role:
          type: string
          enum: [user, assistant]
        content:
          type: string
      required:
        - role
        - content

    ChatRequest:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
      required:
        - messages

    ChatResponse:
      type: object
      properties:
        reply:
          type: string
        extractedPrompt:
          type: string
          description: If the AI produced an optimized Meshy prompt, it is extracted here ready for use.
        extractedParams:
          $ref: "#/components/schemas/PreviewRequest"
      required:
        - reply

    PreviewRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Main generation prompt (max 600 chars)
        ai_model:
          type: string
          enum: [meshy-5, meshy-6, latest]
          default: latest
        model_type:
          type: string
          enum: [standard, lowpoly]
          default: standard
        topology:
          type: string
          enum: [quad, triangle]
          default: quad
        target_polycount:
          type: integer
          minimum: 100
          maximum: 300000
          default: 30000
        should_remesh:
          type: boolean
          default: true
        pose_mode:
          type: string
          enum: [a-pose, t-pose, ""]
          default: t-pose
        target_formats:
          type: array
          items:
            type: string
            enum: [glb, fbx, obj, stl, usdz]
          default: [glb, fbx]
        enable_pbr:
          type: boolean
          default: true
      required:
        - prompt

    RefineRequest:
      type: object
      properties:
        preview_task_id:
          type: string
        texture_prompt:
          type: string
          description: Additional prompt to guide texturing (max 600 chars)
        enable_pbr:
          type: boolean
          default: true
        ai_model:
          type: string
          enum: [meshy-5, meshy-6, latest]
          default: latest
      required:
        - preview_task_id

    RigRequest:
      type: object
      properties:
        input_task_id:
          type: string
          description: The Meshy task ID of a completed textured model. Preferred over model_url.
        model_url:
          type: string
          description: Publicly accessible GLB URL. Use if input_task_id is unavailable.
        height_meters:
          type: number
          default: 1.7
      required: []

    TaskIdResponse:
      type: object
      properties:
        result:
          type: string
          description: The created task ID
      required:
        - result

    MeshyTaskResult:
      type: object
      properties:
        model_urls:
          type: object
          additionalProperties:
            type: string
          description: Map of format (glb, fbx, obj) to download URL
        thumbnail_url:
          type: string
        video_url:
          type: string
        texture_urls:
          type: array
          items:
            type: object
            additionalProperties:
              type: string

    MeshyTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, EXPIRED]
        progress:
          type: integer
        created_at:
          type: integer
        started_at:
          type: integer
        finished_at:
          type: integer
        task_error:
          type: object
          properties:
            message:
              type: string
        result:
          $ref: "#/components/schemas/MeshyTaskResult"
      required:
        - id
        - status
        - progress

    RigTaskResult:
      type: object
      properties:
        rigged_character_fbx_url:
          type: string
        rigged_character_glb_url:
          type: string
        basic_animations:
          type: object
          properties:
            walking_glb_url:
              type: string
            walking_fbx_url:
              type: string
            walking_armature_glb_url:
              type: string
            running_glb_url:
              type: string
            running_fbx_url:
              type: string
            running_armature_glb_url:
              type: string

    RigTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, EXPIRED]
        progress:
          type: integer
        created_at:
          type: integer
        finished_at:
          type: integer
        task_error:
          type: object
          properties:
            message:
              type: string
        result:
          $ref: "#/components/schemas/RigTaskResult"
      required:
        - id
        - status
        - progress

    TextToImageRequest:
      type: object
      properties:
        prompt:
          type: string
          description: Text description of the image to generate (max 600 chars)
        ai_model:
          type: string
          enum: [nano-banana, nano-banana-pro]
          default: nano-banana
        generate_multi_view:
          type: boolean
          default: false
          description: Generate multi-view image showing character from multiple angles
        pose_mode:
          type: string
          enum: [a-pose, t-pose, ""]
          description: Optional pose preset for character generation
        aspect_ratio:
          type: string
          enum: ["1:1", "16:9", "9:16", "4:3", "3:4"]
          default: "1:1"
      required:
        - prompt
        - ai_model

    TextToImageTaskResult:
      type: object
      properties:
        image_urls:
          type: array
          items:
            type: string
          description: URLs of the generated images

    TextToImageTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, EXPIRED]
        progress:
          type: integer
        created_at:
          type: integer
        finished_at:
          type: integer
        task_error:
          type: object
          properties:
            message:
              type: string
        result:
          $ref: "#/components/schemas/TextToImageTaskResult"
      required:
        - id
        - status
        - progress

    RetextureRequest:
      type: object
      properties:
        input_task_id:
          type: string
          description: ID of a completed Text-to-3D, Image-to-3D, or Remesh task to retexture.
        model_url:
          type: string
          description: Publicly accessible URL to a GLB/FBX/OBJ/STL model.
        text_style_prompt:
          type: string
          description: Describe the desired texture style (max 600 chars). Required if image_style_url is not provided.
        image_style_url:
          type: string
          description: URL of a reference image to guide texturing. Required if text_style_prompt is not provided.
        ai_model:
          type: string
          enum: [meshy-5, meshy-6, latest]
          default: latest
        enable_original_uv:
          type: boolean
          default: true
          description: Preserve existing UV mapping from the uploaded model.
        enable_pbr:
          type: boolean
          default: false
          description: Generate PBR maps (metallic, roughness, normal) in addition to base color.
        remove_lighting:
          type: boolean
          default: true
          description: Remove baked highlights/shadows for clean lighting (meshy-6+ only).
        target_formats:
          type: array
          items:
            type: string
            enum: [glb, fbx, obj, stl, usdz]
          default: [glb, fbx]
      required: []

    RetextureTaskResult:
      type: object
      properties:
        model_urls:
          type: object
          additionalProperties:
            type: string
          description: Map of format (glb, fbx, obj) to download URL
        texture_urls:
          type: array
          items:
            type: object
            additionalProperties:
              type: string

    RetextureTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, EXPIRED]
        progress:
          type: integer
        created_at:
          type: integer
        finished_at:
          type: integer
        task_error:
          type: object
          properties:
            message:
              type: string
        result:
          $ref: "#/components/schemas/RetextureTaskResult"
      required:
        - id
        - status
        - progress

    RemeshRequest:
      type: object
      properties:
        input_task_id:
          type: string
          description: ID of a completed Text-to-3D, Image-to-3D, or Retexture task to remesh.
        model_url:
          type: string
          description: Publicly accessible URL to a 3D model (GLB/GLTF/OBJ/FBX/STL).
        target_formats:
          type: array
          items:
            type: string
            enum: [glb, fbx, obj, usdz, blend, stl]
          default: [glb, fbx]
        topology:
          type: string
          enum: [quad, triangle]
          default: triangle
        target_polycount:
          type: integer
          minimum: 100
          maximum: 300000
          default: 30000
        resize_height:
          type: number
          default: 0
          description: Resize model to this height in meters (0 = no resize)
        auto_size:
          type: boolean
          default: false
          description: AI estimates real-world height and resizes automatically
        origin_at:
          type: string
          enum: [bottom, center, ""]
          description: Position of the origin after resize
        convert_format_only:
          type: boolean
          default: false
          description: Only convert file format, skip re-topology
      required: []

    RemeshTaskResult:
      type: object
      properties:
        model_urls:
          type: object
          additionalProperties:
            type: string
          description: Map of format (glb, fbx, obj, etc.) to download URL

    RemeshTask:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        status:
          type: string
          enum: [PENDING, IN_PROGRESS, SUCCEEDED, FAILED, EXPIRED]
        progress:
          type: integer
        created_at:
          type: integer
        finished_at:
          type: integer
        task_error:
          type: object
          properties:
            message:
              type: string
        result:
          $ref: "#/components/schemas/RemeshTaskResult"
      required:
        - id
        - status
        - progress
