kind = "web"
previewPath = "/grudge-pipeline/"
title = "Grudge Pipeline — Meshy AI Studio"
version = "1.0.0"
id = "artifacts/grudge-pipeline"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/grudge-pipeline/" ]
localPort = 25355

[services.development]
run = "pnpm --filter @workspace/grudge-pipeline run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/grudge-pipeline", "run", "build" ]
publicDir = "artifacts/grudge-pipeline/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25355"
BASE_PATH = "/grudge-pipeline/"
