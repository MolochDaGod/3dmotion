<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Motion Training — Zombie Shooter</title>
    <meta name="description" content="Third-person survival wave shooter with 7 weapons, 8 magic spells, and AI-generated characters. Built with React Three Fiber and Rapier physics." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:title" content="Motion Training — Zombie Shooter" />
    <meta property="og:description" content="Third-person survival wave shooter with 7 weapons, 8 magic spells, and AI-generated characters." />
    <meta property="og:image" content="opengraph.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Motion Training — Zombie Shooter" />
    <meta name="twitter:description" content="Survive waves of zombies with 7 weapons and 8 magic spells." />
    <meta name="twitter:image" content="opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- DNS prefetch for Meshy CDN (AI-generated model URLs) -->
    <link rel="dns-prefetch" href="https://cdn.meshy.ai" />

    <!--
      Critical-asset preloads:
      1. Player character FBX — heaviest startup fetch (~4 MB); preloading it here
         lets the browser pipeline start the download before Three.js requests it.
         Vite prepends the configured base path to this relative URL at build time.
      2. Rapier physics WASM — its filename includes a content hash generated at
         build time, so it cannot be statically preloaded here.  Instead it is
         handled by the Workbox CacheFirst runtime rule (30-day TTL) so that
         subsequent page loads serve it from the service-worker cache.
    -->
    <link rel="preload" href="models/character/corsair-king.fbx" as="fetch" crossorigin="anonymous" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
