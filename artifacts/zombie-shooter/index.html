<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Motion Training — Zombie Shooter</title>
    <meta name="description" content="Third-person survival wave shooter with 7 weapons, 8 magic spells, and AI-generated characters. Built with React Three Fiber and Rapier physics." />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Open Graph -->
    <meta property="og:title" content="Motion Training — Zombie Shooter" />
    <meta property="og:description" content="Third-person survival wave shooter with 7 weapons, 8 magic spells, and AI-generated characters." />
    <meta property="og:image" content="opengraph.jpg" />
    <meta property="og:type" content="website" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Motion Training — Zombie Shooter" />
    <meta name="twitter:description" content="Survive waves of zombies with 7 weapons and 8 magic spells." />
    <meta name="twitter:image" content="opengraph.jpg" />

    <link rel="icon" type="image/svg+xml" href="favicon.svg" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- DNS prefetch for Meshy CDN (AI-generated model URLs) -->
    <link rel="dns-prefetch" href="https://cdn.meshy.ai" />

    <!-- Tailwind CSS CDN — runtime class resolution, no Oxide build-time scan -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: ["class"],
        theme: {
          extend: {
            colors: {
              background:  "hsl(var(--background))",
              foreground:  "hsl(var(--foreground))",
              border:      "hsl(var(--border))",
              input:       "hsl(var(--input))",
              ring:        "hsl(var(--ring))",
              primary: {
                DEFAULT:    "hsl(var(--primary))",
                foreground: "hsl(var(--primary-foreground))",
              },
              secondary: {
                DEFAULT:    "hsl(var(--secondary))",
                foreground: "hsl(var(--secondary-foreground))",
              },
              muted: {
                DEFAULT:    "hsl(var(--muted))",
                foreground: "hsl(var(--muted-foreground))",
              },
              accent: {
                DEFAULT:    "hsl(var(--accent))",
                foreground: "hsl(var(--accent-foreground))",
              },
              destructive: {
                DEFAULT:    "hsl(var(--destructive))",
                foreground: "hsl(var(--destructive-foreground))",
              },
              card: {
                DEFAULT:    "hsl(var(--card))",
                foreground: "hsl(var(--card-foreground))",
              },
            },
            borderRadius: {
              lg: "var(--radius)",
              md: "calc(var(--radius) - 2px)",
              sm: "calc(var(--radius) - 4px)",
            },
            fontFamily: {
              sans: ["Inter", "sans-serif"],
            },
          },
        },
      };
    </script>

    <!-- Rapier WASM preload is injected by the injectWasmPreload Vite plugin at build time -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
